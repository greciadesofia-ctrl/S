<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Para Ti 💖</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg, #ffdde1, #ee9ca7);
      text-align: center;
      color: #333;
    }

    header {
      padding: 40px;
      color: white;
    }

    h1 {
      font-size: 40px;
    }

    .card {
      background: white;
      margin: 20px auto;
      padding: 20px;
      border-radius: 15px;
      width: 80%;
      max-width: 500px;
      box-shadow: 0 10px 20px rgba(0,0,0,0.2);
    }

    .fotos {
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
      margin: 20px;
    }

    .fotos img {
      width: 180px;
      height: 180px;
      object-fit: cover;
      border-radius: 15px;
      box-shadow: 0 8px 15px rgba(0,0,0,0.2);
    }

    button {
      background: #e91e63;
      color: white;
      border: none;
      padding: 12px 25px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 16px;
      margin-top: 15px;
    }

    button:hover {
      background: #c2185b;
    }

  </style>
</head>

<body>

  <header>
    <h1>💖 Para Ti 💖</h1>
    <p>Hecho con mucho cariño</p>
  </header>

  <!-- 🎵 MÚSICA (IMPORTANTE: ruta correcta) -->
  <audio id="musica" loop>
    <source src="./musica/cancion.mp3" type="audio/mpeg">
  </audio>

  <button onclick="document.getElementById('musica').play()">
    ▶ Reproducir música
  </button>

  <!-- 💌 MENSAJE -->
  <div class="card">
    <h2>💌 Mensaje especial</h2>
    <p>
      Gracias por ser parte de mi vida 💖<br>
      Esta página es solo para ti ✨<br>
      Te quiero mucho 💕
    </p>
  </div>

  <!-- 📸 FOTOS -->
  <div class="fotos">
    <img src="./fotos/foto1.jpg">
    <img src="./fotos/foto2.jpg">
  </div>

</body>
</html>
