<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Para Ti 💖</title>

  <style>
    body {
      margin: 0;
      font-family: 'Arial', sans-serif;
      background: linear-gradient(135deg, #ffdde1, #ee9ca7);
      text-align: center;
      color: #333;
    }

    header {
      padding: 50px;
      color: white;
    }

    h1 {
      font-size: 40px;
    }

    .mensaje {
      background: white;
      margin: 20px auto;
      padding: 20px;
      border-radius: 15px;
      width: 80%;
      max-width: 500px;
      box-shadow: 0 10px 20px rgba(0,0,0,0.2);
    }

    .fotos {
      display: flex;
      justify-content: center;
      gap: 15px;
      flex-wrap: wrap;
      margin: 20px;
    }

    .fotos img {
      width: 200px;
      height: 200px;
      object-fit: cover;
      border-radius: 15px;
      box-shadow: 0 8px 15px rgba(0,0,0,0.2);
      transition: transform 0.3s;
    }

    .fotos img:hover {
      transform: scale(1.1);
    }

    button {
      background: #e91e63;
      color: white;
      border: none;
      padding: 12px 25px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 16px;
      margin-top: 20px;
    }

    button:hover {
      background: #c2185b;
    }

    footer {
      margin-top: 40px;
      padding: 20px;
      color: white;
    }
  </style>
</head>

<body>

  <header>
    <h1>💖 Para Ti 💖</h1>
    <p>Una página hecha con mucho cariño</p>
  </header>

  <!-- 🎵 MÚSICA -->
  <audio id="musica" loop>
    <source src="musica/cancion.mp3" type="audio/mpeg">
  </audio>

  <button onclick="document.getElementById('musica').play()">
    ▶ Reproducir música
  </button>

  <!-- 💌 MENSAJE -->
  <div class="mensaje">
    <h2>💌 Mensaje Especial</h2>
    <p>
      Gracias por estar en mi vida 💖  
      Esta página es solo un pequeño detalle para ti ✨  
      Te quiero mucho 💕
    </p>
  </div>

  <!-- 📸 FOTOS -->
  <div class="fotos">
    <img src="fotos/foto1.jpg" alt="foto1">
    <img src="fotos/foto2.jpg" alt="foto2">
  </div>

  <footer>
    Hecho con 💖 para ti
  </footer>

</body>
</html>
